<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <clipPath id="iconClip">
      <rect x="0" y="0" width="512" height="512" rx="115" ry="115" />
    </clipPath>

    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFE259" />
      <stop offset="100%" stop-color="#FFA751" />
    </linearGradient>
  </defs>

  <g clip-path="url(#iconClip)">
    <rect width="512" height="512" fill="#1E1233" />

    <g filter="url(#glow)" style="mix-blend-mode: screen;" opacity="0.9">
      <circle cx="216" cy="220" r="110" fill="#00F0FF" />
      <circle cx="296" cy="220" r="110" fill="#00FF87" />
      <circle cx="256" cy="310" r="110" fill="#FF5E3A" />
    </g>

    <g transform="translate(224, 224)">
      <rect width="64" height="64" rx="14" fill="url(#goldGradient)" />
      
      <circle cx="18" cy="18" r="4.5" fill="#1E1233" />
      <circle cx="32" cy="32" r="4.5" fill="#1E1233" />
      <circle cx="46" cy="46" r="4.5" fill="#1E1233" />
    </g>
  </g>
</svg>
